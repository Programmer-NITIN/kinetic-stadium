# ─────────────────────────────────────────────────────────────────────────────
# CrowdPulse AI — Continuous Integration
#
# Runs on every push and pull request:
#   1. Installs Python 3.11 and dependencies
#   2. Runs Pylint for code quality (must score ≥ 9.5/10)
#   3. Runs the full pytest suite with coverage (must be ≥ 90%)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Run Pylint
        run: pylint app/ --fail-under=9.5

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=90
